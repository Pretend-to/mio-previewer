<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>mio-previewer benchmark v2</title>
    <script type="module" src="/benchmark/bench.js"></script>
    <style>
      :root { --bg: #fafafa; --card: white; --accent: #2563eb; --green: #16a34a; --muted: #666; --border: #e5e5e5 }
      * { box-sizing: border-box; margin: 0; padding: 0 }
      body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: #111; padding: 1.5rem; max-width: 1200px; margin: 0 auto }
      h1 { font-size: 1.5rem; margin-bottom: 1rem }
      .controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; padding: 1rem; background: var(--card); border-radius: 8px; border: 1px solid var(--border) }
      button { padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500 }
      .btn-primary { background: var(--green); color: white }
      .btn-primary:hover { filter: brightness(1.1) }
      .btn-secondary { background: #eee; color: #111; border: 1px solid #ddd }
      select, input[type=number] { padding: 0.3rem 0.5rem; border: 1px solid var(--border); border-radius: 4px; font-size: 14px }
      #status { font-size: 13px; color: var(--muted); min-width: 200px }
      .preview-panel { background: var(--card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 1rem }
      .preview-panel .header { padding: 0.5rem 0.75rem; background: #f5f5f5; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--muted); font-weight: 500 }
      #render-content { padding: 1rem; min-height: 200px; max-height: 50vh; overflow-y: auto }
      #render-stats { padding: 0.5rem 1rem; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); background: #fafafa }
      #render-stats table { width: 100%; border-collapse: collapse; margin: 0.5rem 0 }
      #render-stats th, #render-stats td { padding: 4px 8px; text-align: left; border: 1px solid #e0e0e0 }
    </style>
  </head>
  <body>
    <h1>📊 mio-previewer benchmark v2</h1>

    <div class="controls">
      <button class="btn-primary" id="runAllBtn">🚀 Run All Scenarios</button>
      <span style="color:var(--muted)">|</span>
      <label for="fixtureSelect">Fixture:</label>
      <select id="fixtureSelect">
        <option value="complex">complex</option>
        <option value="long-medium">long-medium</option>
        <option value="long-large">long-large</option>
      </select>
      <label for="renderMode">Renderer:</label>
      <select id="renderMode">
        <option value="vhtml">v-html</option>
        <option value="mio">mio-previewer</option>
      </select>
      <label for="chunkSize">Chunk:</label>
      <input id="chunkSize" type="number" value="3" style="width:4rem" />
      <label for="streamDelay">Delay(ms):</label>
      <input id="streamDelay" type="number" value="15" style="width:4rem" />
      <label for="repeats">Repeats:</label>
      <select id="repeats">
        <option value="1" selected>1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
      <label for="maxChunks">Max Chunks:</label>
      <input id="maxChunks" type="number" value="100" style="width:4rem" />
      <button id="startSingle" class="btn-secondary">▶ Run Single</button>
      <button id="clearBtn" class="btn-secondary">Clear</button>
      <span id="status">Ready</span>
    </div>

    <div class="preview-panel">
      <div class="header">Rendered output</div>
      <div id="render-content"></div>
      <div id="render-stats"></div>
    </div>
  </body>
</html>
